---
- name: Healthcheck IBM TS4500 SNMP (FINAL)
  hosts: all
  gather_facts: no

  vars:
    ts4500_ip: "172.18.121.191"
    snmp_community: "docrogestion"
    script_path: "/tmp/check_ts4500_snmp_ESO.sh"

  tasks:

    - name: Validar existencia del script
      stat:
        path: "{{ script_path }}"
      register: script_check

    - name: Falla si el script no existe
      fail:
        msg: "El script {{ script_path }} no existe en el host remoto"
      when: not script_check.stat.exists

    - name: Ejecutar healthcheck TS4500
      command: "{{ script_path }} {{ ts4500_ip }} {{ snmp_community }}"
      register: resultado
      failed_when: false
      changed_when: false

    - name: Mostrar salida STDOUT
      debug:
        msg: |
          ===== RESULTADO HEALTHCHECK =====
          {{ resultado.stdout }}

    - name: Mostrar errores STDERR (si existen)
      debug:
        msg: |
          ===== ERRORES =====
          {{ resultado.stderr }}
      when: resultado.stderr != ""

    - name: Mostrar código de retorno
      debug:
        msg: "Código de retorno: {{ resultado.rc }}"

    - name: Clasificar estado
      set_fact:
        estado: >-
          {% if resultado.rc == 0 %}
          OK
          {% elif resultado.rc == 1 %}
          WARNING
          {% elif resultado.rc == 2 %}
          CRITICAL
          {% else %}
          UNKNOWN
          {% endif %}

    - name: Mostrar estado final
      debug:
        msg: "Estado final TS4500: {{ estado }}"

    - name: Falla controlada si es CRITICAL
      fail:
        msg: |
          🚨 CRITICAL detectado en la librería TS4500
          Detalle:
          {{ resultado.stdout }}
      when: estado == "CRITICAL"
