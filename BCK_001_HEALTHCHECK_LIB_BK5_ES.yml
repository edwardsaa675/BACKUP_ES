---
- hosts: all
  gather_facts: false
  tasks:
  - name: "Validar Semáforo Global (MIB BDT/OEM)"
    command: snmpwalk -v2c -c docrogestion "{{ libreria_TS4500BK5 }}" "{{ MIB-OIDs }}"
    register: snmpwalk
  - debug: var=snmpwalk.stdout_lines
  
    #fail_msg: "El estado global de BDT indica una anomalía (Status: {{ bdt_health.snmp_device['.1.3.6.1.4.1.14851.3.1.15.1.0'] }})"
